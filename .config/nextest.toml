[profile.ci-core]
# Exclude language-specific integration tests from the main CI runs (except unimplemented/unsupported/script/fail/pygrep/shell).
default-filter = "not binary_id(prek::languages) or (binary_id(prek::languages) and (test(unimplemented::) or test(unsupported::) or test(script::) or test(fail::) or test(pygrep::) or test(shell::)))"
status-level = "skip"
final-status-level = "slow"
failure-output = "immediate"
fail-fast = false
test-threads = 8

[profile.ci-language]
inherits = "ci-core"
default-filter = "binary_id(prek::languages)"

[[profile.ci-language.overrides]]
# LuaRocks can hit a race condition when multiple processes are installing the same package.
filter = "test(lua::)"
threads-required = "num-cpus"
